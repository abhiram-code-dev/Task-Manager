<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">Task Manager</h2>

        <div class="form-container section-box" style="text-align: center; margin-top: 40px; border-radius: 12px;">
            <h3 id="form-title" style="margin-bottom: 20px;">Login to your account</h3>

            <div class="input-row" style="flex-direction: column;">
                <input id="username" type="text" placeholder="Username" required>
                <div class="password-wrapper" style="position: relative; width: 100%;">
                    <input id="password" type="password" placeholder="Password" style="width: 100%;" required>
                    <button type="button" id="togglePassword"
                        style="position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; padding: 0; color: #666; font-size: 16px;">👁</button>
                </div>
            </div>

            <div class="btn-group" style="margin-top: 15px; justify-content: center;">
                <button onclick="login()" id="login-btn">Login</button>
                <button onclick="signup()" id="signup-btn" class="secondary-btn">Create an account</button>
            </div>

            <p id="error-message" class="error" style="margin-top: 15px;"></p>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
