<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager — Login</title>
  <meta name="description" content="Sign in to Task Manager to organize your work efficiently.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">✓</div>
        <span>TaskManager</span>
      </div>

      <!-- Heading -->
      <h2 id="form-title">Welcome back</h2>
      <p class="login-subtitle" id="form-subtitle">Sign in to your account to continue.</p>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter your username" autocomplete="username" required>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password"
            required>
          <button type="button" id="togglePassword" class="pw-toggle" title="Toggle password">👁</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="login-actions">
        <button onclick="login()" id="login-btn">Sign In</button>
        <button onclick="signup()" id="signup-btn" class="secondary-btn">Create an account</button>
      </div>

      <span id="error-message" class="error"></span>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>

</html>
